name: Plan

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
    paths:
      - "terraform/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-plan
  cancel-in-progress: false

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.PRODUCTION_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          aws-region: eu-west-1
      - name: Terraform Plan
        id: plan
        uses: alamy-ops/github-actions/actions/terraform@main
        with:
          workspace: production
          action: plan
          working-directory: ./terraform

      - name: Plan metadata
        if: always()
        id: meta
        run: |
          echo "short_sha=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "time=$(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: terraform-plan
          message: |
            ## Terraform Plan — Production ${{ steps.plan.outcome == 'success' && '&#x2705;' || '&#x274C;' }}

            | Detail | Value |
            | ------ | ----- |
            | **Status** | `${{ steps.plan.outcome }}` |
            | **Branch** | `${{ github.head_ref }}` |
            | **Commit** | [`${{ steps.meta.outputs.short_sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }}) |
            | **Ran at** | ${{ steps.meta.outputs.time }} |
            | **Run** | [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            > Merging to `main` creates a semver release tag, which auto-deploys to production via [`production.yml`](${{ github.server_url }}/${{ github.repository }}/actions/workflows/production.yml).