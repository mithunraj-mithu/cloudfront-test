name: Production Deployment

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v1.2.0)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::${{ secrets.PRODUCTION_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          aws-region: ap-south-1

      - name: Terraform Apply
        id: apply
        run: |
          terraform -chdir=terraform init -backend-config=backends/production.conf
          terraform -chdir=terraform workspace select -or-create production
          terraform -chdir=terraform apply -var-file=workspaces/production.tfvars -no-color -auto-approve
        env:
          TF_VAR_aws_account_id: ${{ secrets.PRODUCTION_ACCOUNT_ID }}
          TF_VAR_aws_region: ap-south-1

      - name: Summary
        run: |
          echo "## Deploy to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ inputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** production" >> $GITHUB_STEP_SUMMARY
          echo "- **Apply:** completed" >> $GITHUB_STEP_SUMMARY